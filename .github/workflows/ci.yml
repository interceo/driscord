name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BOOST_VERSION: '1.89.0'

jobs:
  tests:
    name: Tests (Linux)
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            cmake ninja-build \
            libssl-dev \
            libavcodec-dev libavformat-dev libavdevice-dev \
            libswscale-dev libswresample-dev libavutil-dev \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libwayland-dev libxkbcommon-dev \
            libpulse-dev

      - name: Cache Boost headers
        id: cache-boost
        uses: actions/cache@v4
        with:
          path: ~/boost-cache
          key: boost-${{ env.BOOST_VERSION }}-${{ runner.os }}

      - name: Download Boost headers
        if: steps.cache-boost.outputs.cache-hit != 'true'
        run: |
          BOOST_VER_UNDER="${BOOST_VERSION//./_}"
          wget -q "https://archives.boost.io/release/${BOOST_VERSION}/source/boost_${BOOST_VER_UNDER}.tar.gz"
          mkdir -p ~/boost-cache/include
          tar xzf "boost_${BOOST_VER_UNDER}.tar.gz" \
            --strip-components=1 \
            -C ~/boost-cache/include \
            "boost_${BOOST_VER_UNDER}/boost"

      - name: Set BOOST_ROOT
        run: echo "BOOST_ROOT=$HOME/boost-cache" >> $GITHUB_ENV

      - name: Cache CMake FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: .builds/cmake/linux-release/_deps
          key: cmake-deps-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: cmake-deps-${{ runner.os }}-

      - name: Build and run tests
        run: ./scripts/build.sh --test

  build-server:
    name: Build / Signaling Server (Linux)
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            cmake ninja-build \
            libssl-dev

      - name: Cache Boost headers
        id: cache-boost
        uses: actions/cache@v4
        with:
          path: ~/boost-cache
          key: boost-${{ env.BOOST_VERSION }}-${{ runner.os }}

      - name: Download Boost headers
        if: steps.cache-boost.outputs.cache-hit != 'true'
        run: |
          BOOST_VER_UNDER="${BOOST_VERSION//./_}"
          wget -q "https://archives.boost.io/release/${BOOST_VERSION}/source/boost_${BOOST_VER_UNDER}.tar.gz"
          mkdir -p ~/boost-cache/include
          tar xzf "boost_${BOOST_VER_UNDER}.tar.gz" \
            --strip-components=1 \
            -C ~/boost-cache/include \
            "boost_${BOOST_VER_UNDER}/boost"

      - name: Set BOOST_ROOT
        run: echo "BOOST_ROOT=$HOME/boost-cache" >> $GITHUB_ENV

      - name: Cache CMake FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: .builds/cmake/linux-release/_deps
          key: cmake-deps-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: cmake-deps-${{ runner.os }}-

      - name: Build signaling server
        run: ./scripts/build.sh --server

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: driscord-server-linux
          path: .builds/server/release/driscord_server

  build-client:
    name: Build / Qt Client (Linux)
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            cmake ninja-build \
            libssl-dev \
            libavcodec-dev libavformat-dev libavdevice-dev \
            libswscale-dev libswresample-dev libavutil-dev \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libwayland-dev libxkbcommon-dev \
            libpulse-dev \
            qt6-base-dev qt6-declarative-dev qt6-tools-dev \
            qml6-module-qtquick-dialogs qml6-module-qtquick-controls \
            qml6-module-qt-labs-platform

      - name: Cache Boost headers
        id: cache-boost
        uses: actions/cache@v4
        with:
          path: ~/boost-cache
          key: boost-${{ env.BOOST_VERSION }}-${{ runner.os }}

      - name: Download Boost headers
        if: steps.cache-boost.outputs.cache-hit != 'true'
        run: |
          BOOST_VER_UNDER="${BOOST_VERSION//./_}"
          wget -q "https://archives.boost.io/release/${BOOST_VERSION}/source/boost_${BOOST_VER_UNDER}.tar.gz"
          mkdir -p ~/boost-cache/include
          tar xzf "boost_${BOOST_VER_UNDER}.tar.gz" \
            --strip-components=1 \
            -C ~/boost-cache/include \
            "boost_${BOOST_VER_UNDER}/boost"

      - name: Set BOOST_ROOT
        run: echo "BOOST_ROOT=$HOME/boost-cache" >> $GITHUB_ENV

      - name: Cache CMake FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: .builds/cmake/qt-release/_deps
          key: cmake-deps-qt-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: cmake-deps-qt-${{ runner.os }}-

      - name: Build Qt client
        run: ./scripts/build.sh --qt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: driscord-client-linux
          path: .builds/cmake/qt-release/client-qt/driscord_client

  build-api:
    name: Build / API
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/api/requirements.txt

      - name: Install API dependencies
        run: ./scripts/build.sh --api

  build-windows-cross:
    name: Build / Windows core tests (cross-compile)
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies + MinGW
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            cmake ninja-build \
            libssl-dev \
            mingw-w64 gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64
          # Select POSIX threading variant (required for std::thread / std::mutex)
          sudo update-alternatives --set x86_64-w64-mingw32-gcc \
            /usr/bin/x86_64-w64-mingw32-gcc-posix
          sudo update-alternatives --set x86_64-w64-mingw32-g++ \
            /usr/bin/x86_64-w64-mingw32-g++-posix

      - name: Cache Boost headers
        id: cache-boost
        uses: actions/cache@v4
        with:
          path: ~/boost-cache
          key: boost-${{ env.BOOST_VERSION }}-${{ runner.os }}

      - name: Download Boost headers
        if: steps.cache-boost.outputs.cache-hit != 'true'
        run: |
          BOOST_VER_UNDER="${BOOST_VERSION//./_}"
          wget -q "https://archives.boost.io/release/${BOOST_VERSION}/source/boost_${BOOST_VER_UNDER}.tar.gz"
          mkdir -p ~/boost-cache/include
          tar xzf "boost_${BOOST_VER_UNDER}.tar.gz" \
            --strip-components=1 \
            -C ~/boost-cache/include \
            "boost_${BOOST_VER_UNDER}/boost"

      - name: Set BOOST_ROOT
        run: echo "BOOST_ROOT=$HOME/boost-cache" >> $GITHUB_ENV

      - name: Cache CMake FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: .builds/cmake/windows-test/_deps
          key: cmake-deps-windows-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: cmake-deps-windows-${{ runner.os }}-

      - name: Cache Windows third-party prebuilts (FFmpeg + OpenSSL)
        id: cache-win-deps
        uses: actions/cache@v4
        with:
          path: third_party/windows
          key: win-deps-${{ hashFiles('third_party/fetch_win_deps.sh') }}

      - name: Fetch Windows prebuilt dependencies
        if: steps.cache-win-deps.outputs.cache-hit != 'true'
        run: ./third_party/fetch_win_deps.sh

      - name: Build core tests for Windows (no Wine on CI — build only)
        run: ./scripts/build.sh --windows --test
