name: Release

# Triggers:
#   git tag v* → builds + creates GitHub release with artifacts
#   workflow_dispatch → builds only (useful for testing the pipeline)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Linux — builds a self-contained AppImage
  # ---------------------------------------------------------------------------
  linux:
    name: Linux AppImage
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            cmake ninja-build \
            libboost-dev \
            libssl-dev \
            libavcodec-dev libavformat-dev libavdevice-dev \
            libswscale-dev libswresample-dev libavutil-dev \
            libx11-dev libxrandr-dev \
            libpulse-dev \
            libfuse2 \
            zip

      - name: Cache Gradle home
        uses: actions/cache@v4
        with:
          path: .builds/gradle-home
          key: gradle-linux-${{ hashFiles('client-compose/build.gradle.kts', 'client-compose/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Cache CMake FetchContent
        uses: actions/cache@v4
        with:
          path: .builds/cmake/linux-release/_deps
          key: cmake-linux-${{ hashFiles('CMakeLists.txt', 'core/CMakeLists.txt') }}
          restore-keys: cmake-linux-

      - name: Build AppImage
        # APPIMAGE_EXTRACT_AND_RUN: appimagetool is itself an AppImage;
        # GitHub runners don't have FUSE, so we tell it to extract and run.
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: ./scripts/build.sh --package

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: .builds/client/linux/release/*.AppImage
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Windows — cross-compiled from Linux via MinGW, produces a portable zip
  # ---------------------------------------------------------------------------
  windows:
    name: Windows portable zip
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            cmake ninja-build \
            mingw-w64 \
            libarchive-tools \
            zip unzip curl
          # Select POSIX threading variant (required for std::thread / std::mutex)
          sudo update-alternatives --set x86_64-w64-mingw32-gcc \
            /usr/bin/x86_64-w64-mingw32-gcc-posix
          sudo update-alternatives --set x86_64-w64-mingw32-g++ \
            /usr/bin/x86_64-w64-mingw32-g++-posix

      - name: Cache Gradle home
        uses: actions/cache@v4
        with:
          path: .builds/gradle-home
          key: gradle-windows-${{ hashFiles('client-compose/build.gradle.kts', 'client-compose/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Cache Windows third-party packages
        uses: actions/cache@v4
        with:
          path: third_party/.cache
          key: win-deps-ffmpeg-7.1.1-2-openssl-3.3.2-1

      - name: Cache CMake FetchContent (Windows)
        uses: actions/cache@v4
        with:
          path: .builds/cmake/windows-release/_deps
          key: cmake-windows-${{ hashFiles('CMakeLists.txt', 'core/CMakeLists.txt') }}
          restore-keys: cmake-windows-

      - name: Cache Windows JRE download
        uses: actions/cache@v4
        with:
          path: .builds/windows-jre-cache
          key: windows-jre-temurin-21

      - name: Fetch Windows deps (FFmpeg + OpenSSL from MSYS2)
        run: ./third_party/fetch_win_deps.sh

      - name: Build Windows portable zip
        run: ./scripts/build.sh --windows --package

      - name: Upload Windows zip
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: .builds/client/windows/release/*.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Release — creates a GitHub release and attaches both artifacts.
  # Runs only on tag pushes; on workflow_dispatch artifacts are still available
  # in the Actions UI for download.
  # ---------------------------------------------------------------------------
  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [linux, windows]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
