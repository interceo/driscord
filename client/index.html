<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>driscord</title>
    <style>
      body { font-family: ui-sans-serif, system-ui; margin: 0; padding: 16px; }
      header { display: flex; gap: 8px; align-items: center; }
      video { width: 100%; max-height: 60vh; background: #000; }
      textarea { width: 100%; height: 100px; }
      .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
      button { padding: 8px 12px; }
      input, select { padding: 6px 8px; }
    </style>
  </head>
  <body>
    <header>
      <h3 style="margin: 0;">driscord</h3>
      <span id="status">offline</span>
    </header>

    <div class="row" style="margin: 12px 0;">
      <select id="source">
        <option value="camera">Камера</option>
        <option value="screen">Экран/окно</option>
      </select>
      <button id="start">Старт</button>
      <button id="stop" disabled>Стоп</button>
    </div>

    <video id="local" autoplay playsinline muted></video>
    <video id="remote" autoplay playsinline></video>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
